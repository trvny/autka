name: Android CI

on:
  push:
    branches: [ main ]
    # A backend-only or docs-only change can't affect the Android build, so skip it.
    paths-ignore: [ 'backend/**', '**/*.md', 'docs/**', 'LICENSE', '.github/workflows/backend-ci.yml' ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ 'backend/**', '**/*.md', 'docs/**', 'LICENSE', '.github/workflows/backend-ci.yml' ]
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test (debug)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # setup-gradle (v4+) validates the gradle-wrapper.jar checksum automatically
      # on every run and handles Gradle dependency/build caching.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Lint, build and unit test
        run: ./gradlew --no-daemon --stacktrace lintDebug assembleDebug testDebugUnitTest

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
