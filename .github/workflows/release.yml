# ----------------------------------------------------------------------------------------
# Autka release workflow.
#
# This file lives in docs/ because the GitHub App connector cannot write to
# .github/workflows/. To activate it, move it into place and commit:
#
#     git mv docs/release.workflow.yml .github/workflows/release.yml
#     git commit -m "ci: add release workflow"
#
# Trigger: push a tag matching v* (e.g. v0.1.0) or run it manually from the Actions tab.
# It builds a release APK + AAB and publishes them on a GitHub release. Signing is OPT-IN
# (see RELEASING.md): with the keystore secrets set the artifacts are signed; without them
# the build still succeeds but the APK is unsigned (OK for F-Droid, not for Play / direct).
# ----------------------------------------------------------------------------------------
name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # required to create the GitHub release

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode signing keystore
        id: keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Build release APK + AAB
        env:
          AUTKA_KEYSTORE: ${{ steps.keystore.outputs.path }}
          AUTKA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          AUTKA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          AUTKA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon --stacktrace assembleRelease bundleRelease

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find app/build/outputs/apk/release -name '*.apk' -exec cp {} dist/ \; || true
          find app/build/outputs/bundle/release -name '*.aab' -exec cp {} dist/ \; || true
          ls -la dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
